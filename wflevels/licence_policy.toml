# World Foundry asset licence policy — project-level.
#
# Tool-managed.  Do not edit comments-as-data; every policy decision is a
# first-class field in a [[licence]] record.  Use `wf-asset policy add` to
# add or update entries rather than hand-editing this file.
#
# status values:
#   "accept"         — asset with this licence may be imported
#   "reject"         — never import; hard block
#   "reject-default" — blocked by default; can be overridden per-asset with [[waiver]]

require_attribution_credits = true

# ── Accepted ──────────────────────────────────────────────────────────────────

[[licence]]
id = "CC0-1.0"
status = "accept"
requires_attribution = false
reason = "public domain dedication — no restrictions on use, modification, or distribution"

# ── Rejected ──────────────────────────────────────────────────────────────────

[[licence]]
id = "CC-BY-4.0"
status = "reject-default"
requires_attribution = true
reason = "attribution required — acceptable if credits screen is maintained; waiver available per-asset"

[[licence]]
id = "CC-BY-SA-4.0"
status = "reject"
requires_attribution = true
reason = "share-alike would require WF derivative works to be released under CC-BY-SA; incompatible with commercial distribution"

[[licence]]
id = "CC-BY-NC-4.0"
status = "reject"
requires_attribution = true
reason = "noncommercial clause prohibits any revenue-generating use including game sales"

[[licence]]
id = "CC-BY-NC-SA-4.0"
status = "reject"
requires_attribution = true
reason = "noncommercial + share-alike: doubly incompatible with commercial distribution"

[[licence]]
id = "GPL-3.0"
status = "reject"
requires_attribution = false
reason = "copyleft: would require WF engine source to be GPL-licensed if asset is linked"

[[licence]]
id = "LGPL-3.0"
status = "reject"
requires_attribution = false
reason = "copyleft: same reasoning as GPL-3.0 for statically-linked game assets"

[[licence]]
id = "editorial-only"
status = "reject"
requires_attribution = false
reason = "editorial/press-use-only licences prohibit commercial game use entirely"

[[licence]]
id = "royalty-on-revenue"
status = "reject"
requires_attribution = false
reason = "revenue-share clauses create per-unit accounting obligations; deferred to v2 commercial pipeline"

[[licence]]
id = "unknown"
status = "reject"
requires_attribution = false
reason = "no recognisable licence string from provider — fail closed; investigate and add a waiver if appropriate"

# ── Per-asset waivers ─────────────────────────────────────────────────────────
# Add [[waiver]] blocks here to allow specific assets despite their licence.
# Format:
#
# [[waiver]]
# asset_id     = "provider/asset-id"   # e.g. "kenney/medieval-tree-04"
# licence_id   = "CC-BY-SA-4.0"
# approved_by  = "wbnorris"
# approved_at  = "2026-04-28"
# reason       = "stylistic match; legal review completed; credits screen updated"
