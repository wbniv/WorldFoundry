version: '3'

tasks:

  build:
    desc: "Build wf_game (shell script)"
    cmds:
      - bash engine/build_game.sh

  build-cmake:
    desc: "Build wf_game via CMake (Linux)"
    cmds:
      - cmake -S . -B cmake-build-linux -DCMAKE_BUILD_TYPE=Debug
      - cmake --build cmake-build-linux -j

  build-cmake-android:
    desc: "Build libwf_game.so via CMake + NDK (arm64-v8a)"
    vars:
      NDK: /usr/lib/android-sdk/ndk/26.2.11394342
    cmds:
      - |
        cmake -S . -B cmake-build-android \
          -DCMAKE_TOOLCHAIN_FILE={{.NDK}}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-21 \
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - cmake --build cmake-build-android -j

  build-apk:
    desc: "Assemble the Android APK (requires Android SDK + gradle — see android/README.md)"
    dir: android
    cmds:
      - gradle assembleRelease
      - echo "APK → android/app/build/outputs/apk/release/app-release.apk"

  install-apk:
    desc: "Install the APK onto a connected Android device"
    dir: android
    cmds:
      - adb install -r app/build/outputs/apk/release/app-release.apk
      - adb shell am start -n org.worldfoundry.wf_game/android.app.NativeActivity

  run:
    desc: "Run wf_game (cd.iff in cwd)"
    dir: wfsource/source/game
    cmds:
      - LD_LIBRARY_PATH=../../../engine/libs DISPLAY=:0 ../../../engine/wf_game

  gdb:
    desc: "Run wf_game under gdb (-batch backtrace), tee to /tmp/wfgdb.log"
    dir: wfsource/source/game
    cmds:
      - |
        LD_LIBRARY_PATH=../../../engine/libs DISPLAY=:0 \
          gdb -batch -ex run -ex bt -ex 'thread apply all bt' --args \
          ../../../engine/wf_game 2>&1 | tee /tmp/wfgdb.log

  run-level:
    desc: "Run wf_game with -L<path> (usage: task run-level -- wflevels/snowgoons.iff)"
    cmds:
      - |
        ARGS="{{.CLI_ARGS}}"
        if [ -z "$ARGS" ]; then
          echo "Usage: task run-level -- <path/to/level.iff>" >&2
          exit 1
        fi
        LD_LIBRARY_PATH=engine/libs DISPLAY=:0 \
          engine/wf_game "-L$ARGS"

  snowgoons:
    desc: "Run wf_game on wflevels/snowgoons.iff directly (bypass cd.iff)"
    cmds:
      - LD_LIBRARY_PATH=engine/libs DISPLAY=:0 engine/wf_game -Lwflevels/snowgoons.iff

  dev-setup:
    desc: "Install all dev dependencies (Linux build + Android toolchain)"
    cmds:
      - |
        sudo apt-get install -y \
          build-essential \
          cmake \
          libx11-dev \
          libgl1-mesa-dev \
          gdb \
          xxd \
          python3 \
          openjdk-17-jdk \
          adb \
          google-android-ndk-r26c-installer

  md:
    desc: "Convert Markdown to HTML and open in browser (usage: task md -- docs/foo.md)"
    cmds:
      - |
        bash -c '
        set -euo pipefail
        ARGS="{{.CLI_ARGS}}"
        if [ -z "$ARGS" ]; then
          echo "Usage: task md -- <filename> [filename ...]" >&2
          exit 1
        fi
        resolve() {
          local name="$1"
          if [ -f "$name" ]; then
            echo "$name"; return 0
          fi
          for dir in docs; do
            match=$(find "$dir" -name "$name" -type f 2>/dev/null | head -1)
            if [ -n "$match" ]; then
              echo "$match"; return 0
            fi
          done
          return 1
        }
        rc=0
        for F in $ARGS; do
          found=$(resolve "$F") || found=$(resolve "${F}.md") || {
            echo "File not found: $F" >&2; rc=1; continue
          }
          [ "$found" != "$F" ] && echo "Found: $found"
          ./scripts/md-to-pdf.sh "$found" || rc=1
        done
        exit $rc
        '
