<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Party Games · Controller</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E%F0%9F%8E%B2%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="controller.css">
  <!-- Google Cast Sender SDK (loadCastFramework=1 pulls in cast.framework API). -->
  <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
</head>
<body>
  <main>
    <header>
      <p id="status" class="status">connecting…</p>
      <p id="name" class="name"></p>
    </header>
    <div class="cast-row">
      <!-- Google's built-in cast-launcher web component. Renders the standard
           cast button and opens the native device picker on tap. -->
      <google-cast-launcher id="cast-button"></google-cast-launcher>
      <span id="cast-state" class="cast-state">cast: idle</span>
    </div>
    <button id="ping" type="button" class="big-button" disabled>PING</button>
    <p class="help">Tap the cast button to launch the receiver on your TV, then tap PING.</p>
  </main>

  <!-- End-of-game overlay: win/lose flavour for the player. Populated from the
       GAME_OVER broadcast, dismissed by any subsequent phase change. -->
  <div id="outcome" class="outcome" hidden>
    <div class="outcome-content">
      <p id="outcome-headline" class="outcome-headline"></p>
      <p id="outcome-subline" class="outcome-subline"></p>
      <ol id="outcome-scoreboard" class="outcome-scoreboard"></ol>
    </div>
    <div id="confetti" class="confetti" hidden aria-hidden="true"></div>
  </div>

  <script src="controller.js"></script>
</body>
</html>
