# Codemagic CI — WorldFoundry iOS port
#
# See docs/plans/2026-04-21-ios-port-codemagic.md for phase plan.
# Setup docs: docs/codemagic-setup.md (webhook + API token wiring).
#
# Two workflows:
#   ios-simulator-debug (push to 2026-ios) — Phases 0-3, no signing.
#   ios-device-release  (manual/tag)       — Phase 4+, signed arm64 IPA.
#
# Budget: Codemagic individual plan = 500 Mac-min/month. Measured 2-4 min
# per debug build on M2 minis (avg 3.4 min across 29 runs as of 2026-04-22)
# — ~100-150 builds/mo is feasible at this cadence. Release builds are
# similar once signing is warm.

workflows:
  ios-simulator-debug:
    name: iOS Simulator (Debug)
    instance_type: mac_mini_m2
    max_build_duration: 45

    environment:
      xcode: latest

    # python-tui-lib submodule points at a local dev path; not needed for engine
    # build, so skip submodule init on CI.
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '2026-ios'
          include: true
          source: true
      cancel_previous_builds: true

    cache:
      cache_paths:
        # Jolt extracted source — skip tar extraction on warm builds
        - engine/vendor/jolt-physics-5.5.0

    scripts:
      - name: Toolchain versions
        script: |
          set -euo pipefail
          sw_vers
          xcodebuild -version
          cmake --version
          which xcrun
          xcrun --sdk iphonesimulator --show-sdk-path

      - name: Extract Jolt vendor archive
        script: |
          set -euo pipefail
          cd engine/vendor
          if [ ! -d jolt-physics-5.5.0 ]; then
            echo "Extracting jolt-physics-5.5.0.tar.gz..."
            tar -xzf jolt-physics-5.5.0.tar.gz
            extracted=$(tar -tzf jolt-physics-5.5.0.tar.gz | head -1 | cut -d/ -f1)
            mv "$extracted" jolt-physics-5.5.0
            echo "Renamed $extracted -> jolt-physics-5.5.0"
          else
            echo "Jolt already extracted"
          fi

      - name: Configure CMake for iOS Simulator (arm64)
        script: |
          set -euo pipefail
          mkdir -p build-ios-sim
          cd build-ios-sim
          # Phase 0: the CMakeLists.txt has no if(IOS) branch yet; this
          # configure is expected to fail or fall through to the Linux path
          # and then break at build time. That failure *is* the Phase 0
          # signal — the pipeline reached the Mac toolchain.
          cmake -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=Debug \
            ..

      - name: Build
        script: |
          set -euo pipefail
          cd build-ios-sim
          xcodebuild \
            -project wf_game.xcodeproj \
            -scheme wf_game \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            build \
            | tee ../xcodebuild.log
          # xcodebuild exit code is what we care about; `tee` preserves it
          # via pipefail.

      - name: Boot Simulator, install .app, capture screenshot + log
        # Phase 1 Verify proxy for users without a local Mac: Codemagic's Mac
        # runner has Xcode + xcrun simctl, so we install the .app on a boot'd
        # Simulator and capture a screenshot + unified-log output from the
        # launched process. NSLog from WFRootViewController::viewDidLoad
        # (cd.iff sanity probe via HALGetAssetAccessor) is our target signal.
        script: |
          set -euo pipefail

          SIM_ART="$CM_BUILD_DIR/sim-artifacts"
          mkdir -p "$SIM_ART"

          APP="$CM_BUILD_DIR/engine/Debug/wf_game.app"
          BUNDLE_ID="org.worldfoundry.wf-game"

          # Pick the first available iPhone simulator that matches the SDK.
          DEVICE_ID=$(xcrun simctl list -j devices available \
            | python3 -c '
          import json, sys
          j = json.load(sys.stdin)["devices"]
          for runtime, devs in j.items():
              if "iOS" not in runtime: continue
              for d in devs:
                  if "iPhone" in d["name"] and d["isAvailable"]:
                      print(d["udid"]); sys.exit(0)
          sys.exit(1)
          ')
          echo "Using simulator UDID: $DEVICE_ID"

          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b

          echo "--- install ---"
          xcrun simctl install "$DEVICE_ID" "$APP"

          echo "--- launch ---"
          LAUNCH_OUTPUT=$(xcrun simctl launch --terminate-running-process "$DEVICE_ID" "$BUNDLE_ID")
          echo "$LAUNCH_OUTPUT"
          APP_PID=$(echo "$LAUNCH_OUTPUT" | awk '{print $NF}')
          echo "Launched PID: $APP_PID"

          echo "--- sleep 45s — Sim runs at ≈¼ realtime so this is ~10s of game time, plenty to reach steady-state rendering (the earlier 5-min sleep was while we were chasing a z-sort bug we mistook for a camera-stabilization issue) ---"
          sleep 45

          echo "--- screenshot ---"
          xcrun simctl io "$DEVICE_ID" screenshot "$SIM_ART/screenshot-raw.png"
          # `xcrun simctl io screenshot` captures the device's hardware framebuffer
          # in its natural portrait orientation regardless of Info.plist telling
          # iOS the app is landscape-only. Rotate 270° (i.e. 90° CCW) so the
          # scene appears right-side-up — the app is landscape-left, so the
          # portrait hardware framebuffer contains content rotated 90° CW;
          # rotating CCW undoes that. Keep the raw capture for debugging.
          cp "$SIM_ART/screenshot-raw.png" "$SIM_ART/screenshot.png"
          sips -r 270 "$SIM_ART/screenshot.png" > /dev/null

          echo "--- pull wf.log from app data container ---"
          # WFOpenDiagnosticLog dups stdout/stderr to NSTemporaryDirectory()/wf.log
          # in -application:didFinishLaunchingWithOptions: before HALStart runs.
          APP_DATA=$(xcrun simctl get_app_container "$DEVICE_ID" "$BUNDLE_ID" data 2>/dev/null || true)
          if [ -n "$APP_DATA" ] && [ -f "$APP_DATA/tmp/wf.log" ]; then
              cp "$APP_DATA/tmp/wf.log" "$SIM_ART/wf.log"
              echo "--- wf.log size ---"
              wc -c "$SIM_ART/wf.log"
              echo "--- wf.log tail (last 40 lines) ---"
              tail -40 "$SIM_ART/wf.log"
          else
              echo "NOTE: wf.log not found at $APP_DATA/tmp/wf.log (app may not have dup'd fds yet)"
          fi

          echo "--- capture unified log (last 60s, wf_game process) ---"
          # log show reads finished log entries — no streaming, no GNU timeout
          # needed (which doesn't exist on macOS).
          xcrun simctl spawn "$DEVICE_ID" log show \
              --predicate 'processImagePath CONTAINS "wf_game"' \
              --style compact \
              --last 60s \
            > "$SIM_ART/launch.log" 2>&1 || true
          echo "--- last 40 lines of sim log ---"
          tail -40 "$SIM_ART/launch.log" || true

          echo "--- process still alive check ---"
          # If the app crashed, it won't be listed. Non-fatal.
          if xcrun simctl spawn "$DEVICE_ID" launchctl list 2>/dev/null | grep -q wf_game; then
              echo "wf_game still running after 3s"
          else
              echo "NOTE: wf_game not in launchctl list (may have exited cleanly or crashed)"
          fi

          ls -la "$SIM_ART/"

          echo "--- shutdown ---"
          xcrun simctl shutdown "$DEVICE_ID" || true

          # Non-fatal — the sanity probe is informational.
          if grep -q "cd.iff opened" "$SIM_ART/launch.log"; then
              echo "Phase 1 Verify: HALGetAssetAccessor opened cd.iff"
          else
              echo "WARN: did not observe 'cd.iff opened' in sim log — see artifacts"
          fi

    artifacts:
      - sim-artifacts/**
      # CMake sets RUNTIME_OUTPUT_DIRECTORY to ${CMAKE_SOURCE_DIR}/engine, so
      # the .app + its dSYM land under engine/Debug/ on iOS Sim builds.
      - engine/**/*.app
      - engine/**/*.dSYM
      - build-ios-sim/**/*.app
      - build-ios-sim/CMakeFiles/**/*.log
      - xcodebuild.log

  #------------------------------------------------------------------------------
  # ios-device-release — signed arm64 .ipa for TestFlight / ad-hoc install.
  #
  # Phase 4 deliverable. Intentionally manual-trigger-only for now — release
  # builds shouldn't fire on every push to 2026-ios. Once we're shipping,
  # consider a tag-based trigger like `release-*`.
  #
  # This workflow depends on Codemagic-side signing setup that hasn't landed
  # yet. Before the first run will succeed:
  #
  #   1. Enroll in Apple Developer Program ($99/yr individual).
  #   2. In App Store Connect, create an app record with bundle id
  #      org.worldfoundry.wf-game (matches Info.plist). Create an App Store
  #      Connect API key at App Store Connect → Users and Access → Integrations.
  #   3. In Codemagic, Team settings → Integrations → App Store Connect: add
  #      the key. Give it a nickname like "wf_game_appstore".
  #   4. In this project's settings → Code signing, enable automatic iOS code
  #      signing tied to that integration.
  #   5. Uncomment the `integrations:` + `ios_signing:` blocks below.
  #
  # Until then, manual runs of this workflow will reach the "archive" step and
  # fail with a clear "no signing certificate" error — which is itself useful
  # signal that cmake + xcodebuild -sdk iphoneos compile cleanly.
  #------------------------------------------------------------------------------
  ios-device-release:
    name: iOS Device (Release, arm64 IPA)
    instance_type: mac_mini_m2
    max_build_duration: 60

    # Manual trigger only. Launch from the Codemagic dashboard or via API.
    # No `triggering:` → Codemagic won't auto-fire on push.

    environment:
      xcode: latest
      vars:
        BUNDLE_ID: "org.worldfoundry.wf-game"
        XCODE_SCHEME: "wf_game"
        APP_STORE_APPLE_ID: ""     # fill in once App Store Connect app record exists

      # --- Uncomment once Apple Developer enrollment + App Store Connect API
      #     key are wired into Codemagic's integrations (see header block). ---
      # ios_signing:
      #   distribution_type: development   # or app_store for TestFlight
      #   bundle_identifier: $BUNDLE_ID
      # integrations:
      #   app_store_connect: wf_game_appstore

    scripts:
      - name: Toolchain versions
        script: |
          set -euo pipefail
          sw_vers
          xcodebuild -version
          cmake --version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Configure CMake for iOS device (arm64)
        script: |
          set -euo pipefail
          mkdir -p build-ios-dev
          cd build-ios-dev
          cmake -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=Release \
            ..

      - name: Archive (xcodebuild archive)
        script: |
          set -euo pipefail
          cd build-ios-dev
          # Archive targets iphoneos SDK + generic device destination. Signing
          # happens via Codemagic's ios_signing block (once wired) — until
          # then, this step fails with a clear "requires a provisioning
          # profile" error.
          xcodebuild archive \
            -project "${XCODE_SCHEME}.xcodeproj" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$CM_BUILD_DIR/build-ios-dev/${XCODE_SCHEME}.xcarchive" \
            CODE_SIGN_STYLE=Automatic \
            | tee ../xcodebuild-archive.log
          # tee preserves exit code via pipefail.

      - name: Export signed IPA
        script: |
          set -euo pipefail
          # exportOptions tells xcodebuild what kind of IPA to produce. For
          # first device tests, development is cheapest; flip to app-store
          # once we're actually pushing to TestFlight.
          cat > "$CM_BUILD_DIR/export_options.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>              <string>development</string>
            <key>teamID</key>              <string>\$(DEVELOPMENT_TEAM)</string>
            <key>signingStyle</key>        <string>automatic</string>
            <key>stripSwiftSymbols</key>   <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath  "$CM_BUILD_DIR/build-ios-dev/${XCODE_SCHEME}.xcarchive" \
            -exportPath   "$CM_BUILD_DIR/ipa" \
            -exportOptionsPlist "$CM_BUILD_DIR/export_options.plist" \
            | tee "$CM_BUILD_DIR/xcodebuild-export.log"

          echo "--- codesign -v on the IPA ---"
          find "$CM_BUILD_DIR/ipa" -name '*.ipa' -print \
            | xargs -I{} codesign -vvv --deep --strict {}

      - name: Summarize artifact sizes
        script: |
          set -euo pipefail
          find "$CM_BUILD_DIR/ipa" "$CM_BUILD_DIR/build-ios-dev" \
              -maxdepth 4 \( -name '*.ipa' -o -name '*.xcarchive' -o -name '*.dSYM' \) \
              -exec du -sh {} \;

    artifacts:
      - ipa/*.ipa
      - build-ios-dev/*.xcarchive
      - build-ios-dev/**/*.dSYM
      - xcodebuild-archive.log
      - xcodebuild-export.log

    # --- TestFlight push (Phase 5). Uncomment once an App Store Connect
    #     integration exists and the first manual IPA upload has validated. ---
    # publishing:
    #   app_store_connect:
    #     auth: integration
    #     submit_to_testflight: true
    #     beta_groups:
    #       - "Internal Testers"
