# Codemagic CI — WorldFoundry iOS port
#
# See docs/plans/2026-04-21-ios-port-codemagic.md for phase plan.
#
# Phase 0 goal: prove the Mac runner reaches the CMake/Xcode toolchain and
# fails in an identifiable way (hal/ios/ not yet present). No signing.
#
# Budget: Codemagic individual plan = 500 Mac-min/month. Expect ~15–25 min
# per clean build. Phases 0–2 push per step (each run is the only Mac
# feedback we have); batch commits once the pipeline is reliably green.

workflows:
  ios-simulator-debug:
    name: iOS Simulator (Debug)
    instance_type: mac_mini_m2
    max_build_duration: 45

    environment:
      xcode: latest

    # python-tui-lib submodule points at a local dev path; not needed for engine
    # build, so skip submodule init on CI.
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '2026-ios'
          include: true
          source: true
      cancel_previous_builds: true

    scripts:
      - name: Toolchain versions
        script: |
          set -euo pipefail
          sw_vers
          xcodebuild -version
          cmake --version
          which xcrun
          xcrun --sdk iphonesimulator --show-sdk-path

      - name: Configure CMake for iOS Simulator (arm64)
        script: |
          set -euo pipefail
          mkdir -p build-ios-sim
          cd build-ios-sim
          # Phase 0: the CMakeLists.txt has no if(IOS) branch yet; this
          # configure is expected to fail or fall through to the Linux path
          # and then break at build time. That failure *is* the Phase 0
          # signal — the pipeline reached the Mac toolchain.
          cmake -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=Debug \
            ..

      - name: Build
        script: |
          set -euo pipefail
          cd build-ios-sim
          xcodebuild \
            -project wf_game.xcodeproj \
            -scheme wf_game \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            build \
            | tee ../xcodebuild.log
          # xcodebuild exit code is what we care about; `tee` preserves it
          # via pipefail.

      - name: Boot Simulator, install .app, capture screenshot + log
        # Phase 1 Verify proxy for users without a local Mac: Codemagic's Mac
        # runner has Xcode + xcrun simctl, so we install the .app on a boot'd
        # Simulator and capture a screenshot + unified-log output from the
        # launched process. NSLog from WFRootViewController::viewDidLoad
        # (cd.iff sanity probe via HALGetAssetAccessor) is our target signal.
        script: |
          set -euo pipefail

          SIM_ART="$CM_BUILD_DIR/sim-artifacts"
          mkdir -p "$SIM_ART"

          APP="$CM_BUILD_DIR/engine/Debug/wf_game.app"
          BUNDLE_ID="org.worldfoundry.wf-game"

          # Pick the first available iPhone simulator that matches the SDK.
          DEVICE_ID=$(xcrun simctl list -j devices available \
            | python3 -c '
          import json, sys
          j = json.load(sys.stdin)["devices"]
          for runtime, devs in j.items():
              if "iOS" not in runtime: continue
              for d in devs:
                  if "iPhone" in d["name"] and d["isAvailable"]:
                      print(d["udid"]); sys.exit(0)
          sys.exit(1)
          ')
          echo "Using simulator UDID: $DEVICE_ID"

          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b

          echo "--- install ---"
          xcrun simctl install "$DEVICE_ID" "$APP"

          echo "--- launch ---"
          LAUNCH_OUTPUT=$(xcrun simctl launch --terminate-running-process "$DEVICE_ID" "$BUNDLE_ID")
          echo "$LAUNCH_OUTPUT"
          APP_PID=$(echo "$LAUNCH_OUTPUT" | awk '{print $NF}')
          echo "Launched PID: $APP_PID"

          echo "--- sleep 6s to let engine thread tick through HALStart → _InitAudio → PIGSMain ---"
          sleep 6

          echo "--- screenshot ---"
          xcrun simctl io "$DEVICE_ID" screenshot "$SIM_ART/screenshot.png"

          echo "--- pull wf.log from app data container ---"
          # WFOpenDiagnosticLog dups stdout/stderr to NSTemporaryDirectory()/wf.log
          # in -application:didFinishLaunchingWithOptions: before HALStart runs.
          APP_DATA=$(xcrun simctl get_app_container "$DEVICE_ID" "$BUNDLE_ID" data 2>/dev/null || true)
          if [ -n "$APP_DATA" ] && [ -f "$APP_DATA/tmp/wf.log" ]; then
              cp "$APP_DATA/tmp/wf.log" "$SIM_ART/wf.log"
              echo "--- wf.log size ---"
              wc -c "$SIM_ART/wf.log"
              echo "--- wf.log tail (last 40 lines) ---"
              tail -40 "$SIM_ART/wf.log"
          else
              echo "NOTE: wf.log not found at $APP_DATA/tmp/wf.log (app may not have dup'd fds yet)"
          fi

          echo "--- capture unified log (last 60s, wf_game process) ---"
          # log show reads finished log entries — no streaming, no GNU timeout
          # needed (which doesn't exist on macOS).
          xcrun simctl spawn "$DEVICE_ID" log show \
              --predicate 'processImagePath CONTAINS "wf_game"' \
              --style compact \
              --last 60s \
            > "$SIM_ART/launch.log" 2>&1 || true
          echo "--- last 40 lines of sim log ---"
          tail -40 "$SIM_ART/launch.log" || true

          echo "--- process still alive check ---"
          # If the app crashed, it won't be listed. Non-fatal.
          if xcrun simctl spawn "$DEVICE_ID" launchctl list 2>/dev/null | grep -q wf_game; then
              echo "wf_game still running after 3s"
          else
              echo "NOTE: wf_game not in launchctl list (may have exited cleanly or crashed)"
          fi

          ls -la "$SIM_ART/"

          echo "--- shutdown ---"
          xcrun simctl shutdown "$DEVICE_ID" || true

          # Non-fatal — the sanity probe is informational.
          if grep -q "cd.iff opened" "$SIM_ART/launch.log"; then
              echo "Phase 1 Verify: HALGetAssetAccessor opened cd.iff"
          else
              echo "WARN: did not observe 'cd.iff opened' in sim log — see artifacts"
          fi

    artifacts:
      - sim-artifacts/**
      # CMake sets RUNTIME_OUTPUT_DIRECTORY to ${CMAKE_SOURCE_DIR}/engine, so
      # the .app + its dSYM land under engine/Debug/ on iOS Sim builds.
      - engine/**/*.app
      - engine/**/*.dSYM
      - build-ios-sim/**/*.app
      - build-ios-sim/CMakeFiles/**/*.log
      - xcodebuild.log
